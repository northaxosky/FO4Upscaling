name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          lfs: true

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: 'b472291f295551b7127359ea38fdd2ca092f6f1b'

      - name: Prepare CommonLibF4
        shell: bash
        run: cp cmake/CommonLibF4.cmake.txt extern/CommonLibF4/CMakeLists.txt

      - name: Configure
        run: cmake -S . --preset=default

      - name: Build
        run: cmake --build build --config Release

      - name: Fetch SDK runtime DLLs
        shell: bash
        run: bash scripts/fetch-sdks.sh

      - name: Package mod
        shell: bash
        run: |
          PKG="package"
          BLD="build/plugins"

          mkdir -p staging/F4SE/Plugins
          mkdir -p staging/F4SE/Plugins/Upscaling
          mkdir -p staging/F4SE/Plugins/FrameGeneration/FidelityFX
          mkdir -p staging/F4SE/Plugins/FrameGeneration/XeSS
          mkdir -p staging/F4SE/Plugins/FrameGeneration/Streamline
          mkdir -p staging/F4SE/Plugins/Streamline
          # Built DLLs
          cp "$BLD/FrameGeneration/Release/AAAFrameGeneration.dll" staging/F4SE/Plugins/
          cp "$BLD/Upscaling/Release/Upscaling.dll" staging/F4SE/Plugins/
          cp "$BLD/MotionVectorFixes/Release/MotionVectorFixes.dll" staging/F4SE/Plugins/
          # Tracked shader assets
          cp "$PKG/F4SE/Plugins/Upscaling/"*.hlsl staging/F4SE/Plugins/Upscaling/
          cp "$PKG/F4SE/Plugins/FrameGeneration/"*.hlsl staging/F4SE/Plugins/FrameGeneration/
          # Fetched SDK runtime DLLs
          cp "$PKG/F4SE/Plugins/FrameGeneration/FidelityFX/amd_fidelityfx_dx12.dll" staging/F4SE/Plugins/FrameGeneration/FidelityFX/
          for dll in libxess_fg.dll libxell.dll; do
            cp "$PKG/F4SE/Plugins/FrameGeneration/XeSS/$dll" staging/F4SE/Plugins/FrameGeneration/XeSS/
          done
          cp "$PKG/F4SE/Plugins/Streamline/"*.dll staging/F4SE/Plugins/Streamline/
          # FrameGeneration needs its own Streamline copy
          for dll in sl.interposer.dll sl.common.dll sl.dlss_g.dll nvngx_dlssg.dll sl.pcl.dll sl.reflex.dll; do
            cp "$PKG/F4SE/Plugins/Streamline/$dll" staging/F4SE/Plugins/FrameGeneration/Streamline/
          done
          # MCM config
          cp -r "$PKG/MCM" staging/
          # Game asset overrides
          [ -d "$PKG/Meshes" ] && cp -r "$PKG/Meshes" staging/
          [ -d "$PKG/Textures" ] && cp -r "$PKG/Textures" staging/

      - name: Upload mod package
        uses: actions/upload-artifact@v4
        with:
          name: FO4Upscaling
          path: staging/
