name: Release

on:
  push:
    branches: [main]
    paths: [version.txt]

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          lfs: true

      - name: Read version
        id: version
        shell: bash
        run: echo "version=$(cat version.txt | tr -d '[:space:]')" >> "$GITHUB_OUTPUT"

      - name: Check tag exists
        id: check_tag
        shell: bash
        run: |
          if git ls-remote --tags origin "v${{ steps.version.outputs.version }}" | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup vcpkg
        if: steps.check_tag.outputs.exists == 'false'
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: 'b472291f295551b7127359ea38fdd2ca092f6f1b'

      - name: Prepare CommonLibF4
        if: steps.check_tag.outputs.exists == 'false'
        shell: bash
        run: cp cmake/CommonLibF4.cmake.txt extern/CommonLibF4/CMakeLists.txt

      - name: Configure
        if: steps.check_tag.outputs.exists == 'false'
        run: cmake -S . --preset=default

      - name: Build
        if: steps.check_tag.outputs.exists == 'false'
        run: cmake --build build --config Release

      - name: Fetch SDK runtime DLLs
        if: steps.check_tag.outputs.exists == 'false'
        shell: bash
        run: bash scripts/fetch-sdks.sh

      - name: Package plugins
        if: steps.check_tag.outputs.exists == 'false'
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          PKG="package"
          BLD="build/plugins"

          # --- MotionVectorFixes ---
          MV="staging-mv"
          mkdir -p "$MV/F4SE/Plugins"
          cp "$BLD/MotionVectorFixes/Release/MotionVectorFixes.dll" "$MV/F4SE/Plugins/"
          [ -f "$BLD/MotionVectorFixes/Release/MotionVectorFixes.pdb" ] && \
            cp "$BLD/MotionVectorFixes/Release/MotionVectorFixes.pdb" "$MV/F4SE/Plugins/"
          cd "$MV" && 7z a -tzip "../MotionVectorFixes-v${VERSION}.zip" . && cd ..

          # --- Upscaling ---
          US="staging-us"
          mkdir -p "$US/F4SE/Plugins/Upscaling"
          mkdir -p "$US/F4SE/Plugins/Streamline"
          mkdir -p "$US/MCM/Config/Upscaling"
          # DLL + PDB
          cp "$BLD/Upscaling/Release/Upscaling.dll" "$US/F4SE/Plugins/"
          [ -f "$BLD/Upscaling/Release/Upscaling.pdb" ] && \
            cp "$BLD/Upscaling/Release/Upscaling.pdb" "$US/F4SE/Plugins/"
          # Shaders
          cp "$PKG/F4SE/Plugins/Upscaling/"*.hlsl "$US/F4SE/Plugins/Upscaling/"
          # Streamline DLLs (shared — DLSS spatial upscaling)
          cp "$PKG/F4SE/Plugins/Streamline/"*.dll "$US/F4SE/Plugins/Streamline/"
          # MCM config
          cp "$PKG/MCM/Config/Upscaling/"* "$US/MCM/Config/Upscaling/"
          # Mesh overrides
          if [ -d "$PKG/Meshes" ]; then
            cp -r "$PKG/Meshes" "$US/"
          fi
          cd "$US" && 7z a -tzip "../Upscaling-v${VERSION}.zip" . && cd ..

          # --- FrameGeneration ---
          FG="staging-fg"
          mkdir -p "$FG/F4SE/Plugins/FrameGeneration/FidelityFX"
          mkdir -p "$FG/F4SE/Plugins/FrameGeneration/XeSS"
          mkdir -p "$FG/F4SE/Plugins/FrameGeneration/Streamline"
          mkdir -p "$FG/F4SE/Plugins/Streamline"
          mkdir -p "$FG/MCM/Config/FrameGeneration"
          # DLL + PDB
          cp "$BLD/FrameGeneration/Release/AAAFrameGeneration.dll" "$FG/F4SE/Plugins/"
          [ -f "$BLD/FrameGeneration/Release/AAAFrameGeneration.pdb" ] && \
            cp "$BLD/FrameGeneration/Release/AAAFrameGeneration.pdb" "$FG/F4SE/Plugins/"
          # Shaders
          cp "$PKG/F4SE/Plugins/FrameGeneration/"*.hlsl "$FG/F4SE/Plugins/FrameGeneration/"
          # FidelityFX (FSR3 frame gen)
          cp "$PKG/F4SE/Plugins/FrameGeneration/FidelityFX/amd_fidelityfx_dx12.dll" "$FG/F4SE/Plugins/FrameGeneration/FidelityFX/"
          # XeSS-FG (Intel frame gen)
          for dll in libxess_fg.dll libxell.dll; do
            [ -f "$PKG/F4SE/Plugins/FrameGeneration/XeSS/$dll" ] && \
              cp "$PKG/F4SE/Plugins/FrameGeneration/XeSS/$dll" "$FG/F4SE/Plugins/FrameGeneration/XeSS/"
          done
          # Streamline — shared path (interposer loaded by both plugins)
          cp "$PKG/F4SE/Plugins/Streamline/"*.dll "$FG/F4SE/Plugins/Streamline/"
          # Streamline — FG-specific path (DLSS-G, Reflex, PCL)
          for dll in sl.interposer.dll sl.common.dll sl.dlss_g.dll nvngx_dlssg.dll sl.pcl.dll sl.reflex.dll; do
            [ -f "$PKG/F4SE/Plugins/Streamline/$dll" ] && \
              cp "$PKG/F4SE/Plugins/Streamline/$dll" "$FG/F4SE/Plugins/FrameGeneration/Streamline/"
          done
          # MCM config
          cp "$PKG/MCM/Config/FrameGeneration/"* "$FG/MCM/Config/FrameGeneration/"
          cd "$FG" && 7z a -tzip "../FrameGeneration-v${VERSION}.zip" . && cd ..

      - name: Create release
        if: steps.check_tag.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          files: |
            MotionVectorFixes-v${{ steps.version.outputs.version }}.zip
            Upscaling-v${{ steps.version.outputs.version }}.zip
            FrameGeneration-v${{ steps.version.outputs.version }}.zip
          generate_release_notes: true
