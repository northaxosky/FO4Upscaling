[Settings]

; Enable frame generation (can be toggled mid-game)
; Default: true
bFrameGenerationMode = true

; Cap frame rate to monitor refresh rate when VSync is disabled (can be toggled mid-game)
; Default: true
bFrameLimitMode = true

; Frame generation backend (requires game restart to change)
; Default: 1 (0=FSR3, 1=DLSS-G)
iFrameGenType = 1
